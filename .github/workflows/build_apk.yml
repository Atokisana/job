name: Build CENAD APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev build-essential ccache

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          buildozer android clean
          buildozer -v android debug 2>&1 | tee build.log

      - name: Find APK
        if: always()
        run: |
          find . -name "*.apk" 2>/dev/null || echo "Aucun APK"
          ls -la bin/ 2>/dev/null || echo "bin/ absent"
          grep -i "error\|failed" build.log | tail -20

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cenad-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
